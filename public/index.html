<!DOCTYPE html>
<html lang="ja">

<head>
                              <meta charset="UTF-8">
                              <meta name="viewport" content="width=device-width, initial-scale=1.0">
                              <title>Songsphere - 音楽を球体に</title>
                              <style>
                                                            body {
                                                                                          font-family: sans-serif;
                                                                                          padding: 20px;
                                                                                          background-color: #121212;
                                                                                          color: #ffffff;
                                                            }

                                                            input {
                                                                                          padding: 10px;
                                                                                          width: 300px;
                                                                                          font-size: 16px;
                                                                                          border-radius: 5px;
                                                                                          border: none;
                                                            }

                                                            button {
                                                                                          padding: 10px 20px;
                                                                                          font-size: 16px;
                                                                                          cursor: pointer;
                                                                                          border-radius: 5px;
                                                                                          border: none;
                                                                                          background: #1DB954;
                                                                                          color: white;
                                                                                          font-weight: bold;
                                                            }

                                                            ul {
                                                                                          list-style-type: none;
                                                                                          padding: 0;
                                                            }

                                                            li {
                                                                                          background: #282828;
                                                                                          margin: 5px 0;
                                                                                          padding: 10px;
                                                                                          border-radius: 5px;
                                                                                          cursor: pointer;
                                                                                          border: 1px solid #333;
                                                            }

                                                            li:hover {
                                                                                          background: #3e3e3e;
                                                            }

                                                            /* 3Dキャンバスと結果表示エリアのレイアウト */
                                                            #mainContent {
                                                                                          display: flex;
                                                                                          flex-direction: column;
                                                                                          align-items: center;
                                                                                          margin-top: 20px;
                                                                                          display: none;
                                                            }

                                                            #canvasContainer {
                                                                                          width: 100%;
                                                                                          max-width: 600px;
                                                                                          height: 400px;
                                                                                          background: #000;
                                                                                          border-radius: 10px;
                                                                                          overflow: hidden;
                                                                                          margin-bottom: 20px;
                                                            }

                                                            #resultArea {
                                                                                          max-width: 600px;
                                                                                          background: #282828;
                                                                                          padding: 20px;
                                                                                          border-radius: 10px;
                                                            }

                                                            blockquote {
                                                                                          font-style: italic;
                                                                                          color: #b3b3b3;
                                                                                          border-left: 4px solid #1DB954;
                                                                                          padding-left: 10px;
                                                            }
                              </style>
                              <!-- Three.jsの読み込み -->
                              <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

                              <h1>Songsphere</h1>
                              <p>曲名やアーティスト名で検索して、あなただけの音楽の球体を生成します。</p>

                              <!-- 検索ボックス -->
                              <div>
                                                            <input type="text" id="searchInput"
                                                                                          placeholder="例: Bohemian Rhapsody Queen">
                                                            <button onclick="searchItunes()">検索</button>
                              </div>

                              <!-- 検索結果リスト -->
                              <ul id="resultsList"></ul>

                              <!-- メインコンテンツ（3D球体 + 批評） -->
                              <div id="mainContent">
                                                            <div id="canvasContainer"></div>
                                                            <div id="resultArea">
                                                                                          <h2 id="selectedSong"
                                                                                                                        style="margin-top: 0;">
                                                                                          </h2>
                                                                                          <p><strong>AIの批評:</strong></p>
                                                                                          <blockquote id="critiqueData">
                                                                                          </blockquote>
                                                                                          <p
                                                                                                                        style="font-size: 0.8em; color: #888;">
                                                                                                                        [Debug]
                                                                                                                        Params:
                                                                                                                        <span
                                                                                                                                                      id="paramsData"></span>
                                                                                          </p>
                                                            </div>
                              </div>

                              <script>
                                                            // --- 1. 検索処理 (自作バックエンドAPI経由) ---
                                                            async function searchItunes() {
                                                                                          const query = document.getElementById('searchInput').value;
                                                                                          if (!query) return;

                                                                                          const list = document.getElementById('resultsList');
                                                                                          list.innerHTML = '<li>検索中...</li>';
                                                                                          document.getElementById('mainContent').style.display = 'none';

                                                                                          // 通信先をRenderの自作APIに変更
                                                                                          const url = `https://songspere-api.onrender.com/search?query=${encodeURIComponent(query)}`;

                                                                                          try {
                                                                                                                        const response = await fetch(url);
                                                                                                                        const data = await response.json();

                                                                                                                        list.innerHTML = '';
                                                                                                                        if (!data.results || data.results.length === 0) {
                                                                                                                                                      list.innerHTML = '<li>見つかりませんでした。</li>';
                                                                                                                                                      return;
                                                                                                                        }

                                                                                                                        data.results.forEach(track => {
                                                                                                                                                      const li = document.createElement('li');
                                                                                                                                                      li.textContent = `${track.trackName} - ${track.artistName}`;
                                                                                                                                                      li.onclick = () => generateSphere(track.trackName, track.artistName);
                                                                                                                                                      list.appendChild(li);
                                                                                                                        });
                                                                                          } catch (error) {
                                                                                                                        console.error("検索エラー:", error);
                                                                                                                        list.innerHTML = '<li>エラーが発生しました。</li>';
                                                                                          }
                                                            }

                                                            // --- 2. 生成バックエンドAPI通信 ---
                                                            async function generateSphere(trackName, artistName) {
                                                                                          const list = document.getElementById('resultsList');
                                                                                          list.innerHTML = `<li>「${trackName}」の概念をAIが分析中... (数秒かかります)</li>`;

                                                                                          try {
                                                                                                                        const response = await fetch("https://songspere-api.onrender.com/generate", {
                                                                                                                                                      method: "POST",
                                                                                                                                                      headers: { "Content-Type": "application/json" },
                                                                                                                                                      body: JSON.stringify({ track_name: trackName, artist_name: artistName })
                                                                                                                        });

                                                                                                                        const result = await response.json();
                                                                                                                        list.innerHTML = '';

                                                                                                                        // テキスト情報の設定
                                                                                                                        document.getElementById('mainContent').style.display = 'flex';
                                                                                                                        document.getElementById('selectedSong').textContent = `${result.track_name} by ${result.artist_name}`;
                                                                                                                        document.getElementById('paramsData').textContent = JSON.stringify(result.params);
                                                                                                                        document.getElementById('critiqueData').textContent = result.critique;

                                                                                                                        // 3D球体の描画関数を呼び出す
                                                                                                                        draw3DSphere(result.params);

                                                                                          } catch (error) {
                                                                                                                        console.error("生成エラー:", error);
                                                                                                                        list.innerHTML = '<li>分析に失敗しました。</li>';
                                                                                          }
                                                            }

                                                            // --- 3. Three.js による 3D球体の描画 ---
                                                            let animationId; // アニメーションをリセットするためのID

                                                            function draw3DSphere(params) {
                                                                                          const container = document.getElementById('canvasContainer');
                                                                                          container.innerHTML = ''; // 以前の描画をクリア
                                                                                          if (animationId) cancelAnimationFrame(animationId);

                                                                                          // シーン、カメラ、レンダラーのセットアップ
                                                                                          const scene = new THREE.Scene();
                                                                                          const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
                                                                                          const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                                                                                          renderer.setSize(container.clientWidth, container.clientHeight);
                                                                                          container.appendChild(renderer.domElement);

                                                                                          // オブジェクトの作成（少し抽象的な多面体スフィア）
                                                                                          const geometry = new THREE.IcosahedronGeometry(2, 2);

                                                                                          // パラメータを視覚効果にマッピング
                                                                                          const hue = params.color_intensity || 0.5;
                                                                                          const color = new THREE.Color().setHSL(hue, 0.8, 0.5);

                                                                                          const material = new THREE.MeshStandardMaterial({
                                                                                                                        color: color,
                                                                                                                        wireframe: true,
                                                                                                                        emissive: color,
                                                                                                                        emissiveIntensity: 0.5
                                                                                          });

                                                                                          const sphere = new THREE.Mesh(geometry, material);
                                                                                          scene.add(sphere);

                                                                                          // ライティング
                                                                                          const light = new THREE.DirectionalLight(0xffffff, 1);
                                                                                          light.position.set(5, 5, 5);
                                                                                          scene.add(light);
                                                                                          camera.position.z = 5;

                                                                                          // アニメーションループ
                                                                                          const clock = new THREE.Clock();
                                                                                          function animate() {
                                                                                                                        animationId = requestAnimationFrame(animate);
                                                                                                                        const time = clock.getElapsedTime();

                                                                                                                        const rotSpeed = params.rotation_speed || 1.0;
                                                                                                                        sphere.rotation.x += 0.005 * rotSpeed;
                                                                                                                        sphere.rotation.y += 0.01 * rotSpeed;

                                                                                                                        const turb = params.turbulence || 0.5;
                                                                                                                        const pulse = 1 + Math.sin(time * 3) * (0.1 * turb);
                                                                                                                        sphere.scale.set(pulse, pulse, pulse);

                                                                                                                        renderer.render(scene, camera);
                                                                                          }
                                                                                          animate();
                                                            }
                              </script>
</body>

</html>
